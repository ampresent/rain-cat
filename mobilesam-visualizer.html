<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text2: #8888a0;
    --accent: #00e5ff;
    --accent2: #7c4dff;
    --green: #00e676;
    --red: #ff5252;
    --orange: #ffab40;
    --yellow: #ffd740;
    --pink: #ff4081;
    --cyan: #00e5ff;
    --radius: 12px;
    --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', 'Noto Sans SC', sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
  }
  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 0 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--cyan), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .header .sub {
    color: var(--text2);
    font-size: 14px;
    margin-top: 6px;
    font-family: var(--mono);
  }
  /* ── Scene Tabs ── */
  .scene-tabs {
    display: flex;
    gap: 4px;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    justify-content: center;
    flex-wrap: wrap;
  }
  .scene-tab {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--mono);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .scene-tab:hover { background: var(--surface2); color: var(--text); }
  .scene-tab.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--cyan);
    color: var(--cyan);
  }
  /* ── Layout ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .pipeline { display: flex; flex-direction: column; gap: 32px; }
  /* ── Step Card ── */
  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .step-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .step-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    font-family: var(--mono);
    flex-shrink: 0;
  }
  .step-num.input { background: rgba(0,229,255,0.15); color: var(--cyan); }
  .step-num.process { background: rgba(124,77,255,0.15); color: var(--accent2); }
  .step-num.output { background: rgba(0,230,118,0.15); color: var(--green); }
  .step-title { font-size: 16px; font-weight: 600; }
  .step-desc { font-size: 13px; color: var(--text2); margin-left: auto; font-family: var(--mono); }
  .step-body { padding: 20px; }
  /* ── Visual Grid ── */
  .viz-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 900px) { .viz-grid { grid-template-columns: 1fr; } }
  .viz-panel {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .viz-panel-title {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
  }
  .viz-panel-body { padding: 12px; position: relative; }
  .viz-panel-body canvas, .viz-panel-body img {
    width: 100%;
    border-radius: 4px;
    display: block;
  }
  /* ── Canvas overlays ── */
  .canvas-wrap { position: relative; }
  .canvas-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  /* ── Data Table ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--surface2);
    color: var(--text2);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 12px;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-cyan { background: rgba(0,229,255,0.15); color: var(--cyan); }
  .badge-purple { background: rgba(124,77,255,0.15); color: var(--accent2); }
  .badge-green { background: rgba(0,230,118,0.15); color: var(--green); }
  .badge-orange { background: rgba(255,171,64,0.15); color: var(--orange); }
  .badge-red { background: rgba(255,82,82,0.15); color: var(--red); }
  /* ── Math Block ── */
  .math-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    color: var(--text2);
    overflow-x: auto;
    margin: 12px 0;
  }
  .math-block .op { color: var(--cyan); font-weight: 600; }
  .math-block .val { color: var(--green); }
  .math-block .var { color: var(--orange); }
  .math-block .comment { color: #555; }
  /* ── Pipeline Arrow ── */
  .arrow-down {
    display: flex;
    justify-content: center;
    padding: 8px 0;
    color: var(--text2);
    font-size: 20px;
  }
  /* ── BBox Canvas ── */
  .bbox-canvas { cursor: crosshair; }
  .bbox-label {
    position: absolute;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    font-family: var(--mono);
    white-space: nowrap;
  }
  /* ── Slider ── */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
  }
  .slider-row label {
    font-size: 12px;
    color: var(--text2);
    min-width: 80px;
    font-family: var(--mono);
  }
  .slider-row input[type=range] { flex: 1; accent-color: var(--cyan); }
  .slider-row .val {
    font-size: 12px;
    color: var(--cyan);
    font-family: var(--mono);
    min-width: 40px;
    text-align: right;
  }
  /* ── Mask Overlay Controls ── */
  .overlay-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 8px 0;
  }
  .overlay-btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.15s;
  }
  .overlay-btn:hover { border-color: var(--cyan); color: var(--text); }
  .overlay-btn.active { background: rgba(0,229,255,0.1); border-color: var(--cyan); color: var(--cyan); }
  /* ── Flow Diagram ── */
  .flow-diagram {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 16px 0;
    overflow-x: auto;
    justify-content: center;
  }
  .flow-node {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    text-align: center;
    min-width: 120px;
    flex-shrink: 0;
  }
  .flow-node .icon { font-size: 24px; margin-bottom: 4px; }
  .flow-node .name { font-size: 12px; font-weight: 600; }
  .flow-node .detail { font-size: 10px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }
  .flow-node.active { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,229,255,0.1); }
  .flow-arrow {
    font-size: 18px;
    color: var(--text2);
    padding: 0 8px;
    flex-shrink: 0;
  }
  /* ── Stats ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 12px 0;
  }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .stat-card .stat-val {
    font-size: 24px;
    font-weight: 700;
    font-family: var(--mono);
  }
  .stat-card .stat-label {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  /* ── Tooltip ── */
  .tooltip {
    position: absolute;
    background: rgba(0,0,0,0.9);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    z-index: 50;
    max-width: 300px;
    font-family: var(--mono);
    display: none;
  }
  /* ── Mask Editor ── */
  .editor-toolbar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 8px 0;
    align-items: center;
  }
  .editor-tool {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .editor-tool:hover { border-color: var(--cyan); color: var(--text); }
  .editor-tool.active { background: rgba(0,229,255,0.15); border-color: var(--cyan); color: var(--cyan); }
  .editor-tool.danger:hover { border-color: var(--red); color: var(--red); }
  .editor-tool.success:hover { border-color: var(--green); color: var(--green); }
  .editor-sep {
    width: 1px; height: 24px;
    background: var(--border);
    margin: 0 4px;
  }
  .editor-canvas-wrap {
    position: relative;
    cursor: none;
    border-radius: 4px;
    overflow: hidden;
  }
  .editor-canvas-wrap canvas {
    display: block;
    width: 100%;
  }
  #editorCursor {
    position: absolute;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
    display: none;
  }
  .editor-stats {
    display: flex;
    gap: 16px;
    padding: 8px 0;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text2);
  }
  .editor-stats span { color: var(--cyan); }
  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header h1 { font-size: 20px; }
    .container { padding: 12px; }
    .step-body { padding: 12px; }
  }
</style>
</head>

// ════════════════════════════════════════════════
// Image Loader
// ════════════════════════════════════════════════
function loadImage(src) {
  if (imageCache[src]) return Promise.resolve(imageCache[src]);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => { imageCache[src] = img; resolve(img); };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

function renderTabs() {
  const container = document.getElementById('sceneTabs');
  container.innerHTML = Object.entries(SCENES).map(([id, s]) =>
    `<button class="scene-tab ${id === currentScene ? 'active' : ''}" data-scene="${id}">${s.label}</button>`
  ).join('');
  container.querySelectorAll('.scene-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentScene = btn.dataset.scene;
      selectedObjIdx = -1;
      renderTabs();
      renderPipeline();
    });
  });
}

// Drawing Functions
// ════════════════════════════════════════════════

function drawSceneWithBBoxes(scene, img, maskImgs, highlightIdx = -1) {
  const canvas = document.getElementById('sceneCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, IMG_W, IMG_H);
  if (img) ctx.drawImage(img, 0, 0, IMG_W, IMG_H);

  const colors = ['#00e5ff', '#ff4081', '#ffab40', '#00e676', '#7c4dff', '#ffd740'];
  scene.objects.forEach((o, i) => {
    const [x1, y1, x2, y2] = o.bbox;
    const color = colors[i % colors.length];
    const isActive = highlightIdx === -1 || highlightIdx === i;

    ctx.strokeStyle = color;
    ctx.lineWidth = isActive ? 2.5 : 1;
    ctx.globalAlpha = isActive ? 1 : 0.3;
    ctx.setLineDash(isActive ? [] : [4, 4]);
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

    if (isActive) {
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.15;
      ctx.fillRect(x1, y1, x2 - x1, y2 - y1);

      ctx.globalAlpha = 1;
      ctx.font = '11px monospace';
      const textW = ctx.measureText(o.label).width + 12;
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(x1, y1 - 20, textW, 18);
      ctx.fillStyle = color;
      ctx.fillText(o.label, x1 + 6, y1 - 6);
    }
  });

  // walkable
  if (scene.walkable && (highlightIdx === -1 || highlightIdx === 'walkable')) {
    const [x1, y1, x2, y2] = scene.walkable.bbox;
    ctx.strokeStyle = '#00e676';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = highlightIdx === 'walkable' ? 0.8 : 0.2;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
  }
  // water
  if (scene.water && (highlightIdx === -1 || highlightIdx === 'water')) {
    const [x1, y1, x2, y2] = scene.water.bbox;
    ctx.strokeStyle = '#7c4dff';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = highlightIdx === 'water' ? 0.8 : 0.2;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
  }

  ctx.globalAlpha = 1;
  ctx.setLineDash([]);
}

function drawPreprocess(img) {
  const canvas = document.getElementById('preprocessCanvas');
  if (!canvas || !img) return;
  const ctx = canvas.getContext('2d');
  const S = MOBILESAM_SIZE;

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, S, S);

  // Scale
  const scale = S / Math.max(IMG_W, IMG_H);
  const newW = Math.round(IMG_W * scale);
  const newH = Math.round(IMG_H * scale);

  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(img, 0, 0, newW, newH);

  // Draw padding region
  ctx.strokeStyle = 'rgba(255,171,64,0.5)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.strokeRect(0, 0, newW, newH);
  ctx.setLineDash([]);

  // Label
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(8, 8, 280, 60);
  ctx.font = '12px monospace';
  ctx.fillStyle = '#ffab40';
  ctx.fillText(`Resize: ${IMG_W}×${IMG_H} → ${newW}×${newH}`, 16, 28);
  ctx.fillStyle = '#888';
  ctx.fillText(`Pad to: ${S}×${S} (right+bottom zeros)`, 16, 46);
  ctx.fillStyle = '#00e5ff';
  ctx.fillText(`Scale factor: ${scale.toFixed(6)}`, 16, 62);

  // Draw grid showing padding
  if (newW < S || newH < S) {
    ctx.fillStyle = 'rgba(255,82,82,0.08)';
    ctx.fillRect(newW, 0, S - newW, S);
    ctx.fillRect(0, newH, S, S - newH);
    ctx.fillStyle = 'rgba(255,82,82,0.4)';
    ctx.font = '14px monospace';
    ctx.fillText('ZERO PAD', newW + 20, S / 2);
  }
}

function drawEmbeddings() {
  const canvas = document.getElementById('embedCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = 512, H = 512;

  // Generate pseudo-random embedding visualization
  const imgData = ctx.createImageData(W, H);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      // Simulate feature map patterns
      const cx = x / W, cy = y / H;
      const freq1 = Math.sin(cx * 20 + cy * 10) * 0.5 + 0.5;
      const freq2 = Math.cos(cx * 15 - cy * 25) * 0.5 + 0.5;
      const freq3 = Math.sin((cx + cy) * 30) * 0.5 + 0.5;
      const edge = Math.abs(Math.sin(cx * 60)) * Math.abs(Math.sin(cy * 60));

      imgData.data[idx] = Math.floor(freq1 * 120 + edge * 80);
      imgData.data[idx + 1] = Math.floor(freq2 * 100 + edge * 60);
      imgData.data[idx + 2] = Math.floor(freq3 * 150 + edge * 40);
      imgData.data[idx + 3] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);

  // Labels
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(8, 8, 320, 44);
  ctx.font = '12px monospace';
  ctx.fillStyle = '#00e5ff';
  ctx.fillText('Image Embeddings: [1, 256, 64, 64]', 16, 28);
  ctx.fillStyle = '#888';
  ctx.fillText('256-dim feature per 16×16 patch → pseudo RGB', 16, 44);
}

function drawDecoder(scene, img, maskImgs, objIdx) {
  const canvas = document.getElementById('decoderCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, IMG_W, IMG_H);

  if (img) ctx.drawImage(img, 0, 0, IMG_W, IMG_H);

  const obj = scene.objects[objIdx];
  if (!obj) return;

  // Draw bbox
  const [x1, y1, x2, y2] = obj.bbox;
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = 2;
  ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

  // Draw mask overlay
  const maskImg = maskImgs[obj.id];
  if (maskImg) {
    ctx.globalAlpha = 0.45;
    ctx.drawImage(maskImg, 0, 0, IMG_W, IMG_H);
    ctx.globalAlpha = 1;
  }

  // Draw bbox corners
  const corners = [[x1, y1], [x2, y1], [x2, y2], [x1, y2]];
  ctx.fillStyle = '#00e5ff';
  corners.forEach(([cx, cy]) => {
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fill();
  });

  // Labels
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(x1, y1 - 24, 200, 20);
  ctx.font = '12px monospace';
  ctx.fillStyle = '#00e5ff';
  ctx.fillText(`bbox: [${obj.bbox.join(', ')}] → mask`, x1 + 6, y1 - 8);
}

function drawOutput(scene, img, maskImgs, mode) {
  const canvas = document.getElementById('outputCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, IMG_W, IMG_H);

  if (img) ctx.drawImage(img, 0, 0, IMG_W, IMG_H);

  const alpha = overlayOpacity;

  if (mode === 'combo' && maskImgs['_combo']) {
    ctx.globalAlpha = alpha;
    ctx.drawImage(maskImgs['_combo'], 0, 0, IMG_W, IMG_H);
    ctx.globalAlpha = 1;
  } else if (mode === 'individual') {
    const colors = ['rgba(0,229,255,0.4)', 'rgba(255,64,129,0.4)', 'rgba(255,171,64,0.4)', 'rgba(0,230,118,0.4)', 'rgba(124,77,255,0.4)'];
    scene.objects.forEach((o, i) => {
      const mImg = maskImgs[o.id];
      if (mImg) {
        // Tint the mask
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = IMG_W;
        tmpCanvas.height = IMG_H;
        const tmpCtx = tmpCanvas.getContext('2d');
        tmpCtx.drawImage(mImg, 0, 0, IMG_W, IMG_H);
        tmpCtx.globalCompositeOperation = 'source-in';
        tmpCtx.fillStyle = colors[i % colors.length];
        tmpCtx.fillRect(0, 0, IMG_W, IMG_H);

        ctx.globalAlpha = alpha;
        ctx.drawImage(tmpCanvas, 0, 0);
        ctx.globalAlpha = 1;
      }
    });
  } else if (mode === 'walkable' && maskImgs['walkable']) {
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = IMG_W;
    tmpCanvas.height = IMG_H;
    const tmpCtx = tmpCanvas.getContext('2d');
    tmpCtx.drawImage(maskImgs['walkable'], 0, 0, IMG_W, IMG_H);
    tmpCtx.globalCompositeOperation = 'source-in';
    tmpCtx.fillStyle = 'rgba(0,230,118,0.5)';
    tmpCtx.fillRect(0, 0, IMG_W, IMG_H);
    ctx.globalAlpha = alpha;
    ctx.drawImage(tmpCanvas, 0, 0);
    ctx.globalAlpha = 1;
  } else if (mode === 'water' && maskImgs['water']) {
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = IMG_W;
    tmpCanvas.height = IMG_H;
    const tmpCtx = tmpCanvas.getContext('2d');
    tmpCtx.drawImage(maskImgs['water'], 0, 0, IMG_W, IMG_H);
    tmpCtx.globalCompositeOperation = 'source-in';
    tmpCtx.fillStyle = 'rgba(124,77,255,0.5)';
    tmpCtx.fillRect(0, 0, IMG_W, IMG_H);
    ctx.globalAlpha = alpha;
    ctx.drawImage(tmpCanvas, 0, 0);
    ctx.globalAlpha = 1;
  } else if (mode === 'depth' && scene.depth) {
    const depthImg = imageCache[scene.depth];
    if (depthImg) {
      ctx.globalAlpha = alpha;
      ctx.drawImage(depthImg, 0, 0, IMG_W, IMG_H);
      ctx.globalAlpha = 1;
    }
  }
}

function drawVerification(scene, img, maskImgs, objIdx) {
  const canvas = document.getElementById('verifyCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, IMG_W, IMG_H);

  if (img) ctx.drawImage(img, 0, 0, IMG_W, IMG_H);

  const obj = scene.objects[objIdx];
  if (!obj) return;

  const maskImg = maskImgs[obj.id];
  if (maskImg) {
    // Red overlay (verification style)
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = IMG_W;
    tmpCanvas.height = IMG_H;
    const tmpCtx = tmpCanvas.getContext('2d');
    tmpCtx.drawImage(maskImg, 0, 0, IMG_W, IMG_H);
    tmpCtx.globalCompositeOperation = 'source-in';
    tmpCtx.fillStyle = 'rgba(200,0,0,0.5)';
    tmpCtx.fillRect(0, 0, IMG_W, IMG_H);
    ctx.drawImage(tmpCanvas, 0, 0);
  }

  // Label
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(8, 8, 360, 24);
  ctx.font = '12px monospace';
  ctx.fillStyle = '#ff5252';
  ctx.fillText(`验证: ${obj.label} — 红色区域 = mask 叠加`, 16, 26);
}

const editor = {
  tool: 'brush',       // brush | eraser | fill
  brushSize: 20,
  isDrawing: false,
  lastX: -1, lastY: -1,
  history: [],         // ImageData stack
  historyIdx: -1,
  maxHistory: 40,
  currentMaskId: null,
  maskData: null,      // Uint8ClampedArray (IMG_W * IMG_H), 0 or 255
  originalMask: null,  // copy of the loaded mask
};

function initEditor(scene, img, maskImgs) {
  const bgCanvas = document.getElementById('editorBgCanvas');
  const maskCanvas = document.getElementById('editorMaskCanvas');
  const overlayCanvas = document.getElementById('editorOverlayCanvas');
  const previewCanvas = document.getElementById('editorPreviewCanvas');
  if (!bgCanvas || !maskCanvas || !overlayCanvas) return;

  const bgCtx = bgCanvas.getContext('2d');
  const maskCtx = maskCanvas.getContext('2d');
  const overlayCtx = overlayCanvas.getContext('2d');

  // Draw background
  bgCtx.clearRect(0, 0, IMG_W, IMG_H);
  if (img) bgCtx.drawImage(img, 0, 0, IMG_W, IMG_H);

  // Load first mask
  const firstObj = scene.objects[0];
  if (firstObj) loadEditorMask(scene, maskImgs, firstObj.id);

  // Tool buttons
  const toolBrush = document.getElementById('toolBrush');
  const toolEraser = document.getElementById('toolEraser');
  const toolFill = document.getElementById('toolFill');
  const toolUndo = document.getElementById('toolUndo');
  const toolRedo = document.getElementById('toolRedo');
  const toolReset = document.getElementById('toolReset');
  const toolInvert = document.getElementById('toolInvert');
  const toolDownload = document.getElementById('toolDownload');
  const brushSizeSlider = document.getElementById('brushSize');
  const brushSizeVal = document.getElementById('brushSizeVal');
  const editorTarget = document.getElementById('editorTarget');
  const cursor = document.getElementById('editorCursor');

  function setTool(t) {
    editor.tool = t;
    [toolBrush, toolEraser, toolFill].forEach(b => b.classList.remove('active'));
    if (t === 'brush') toolBrush.classList.add('active');
    else if (t === 'eraser') toolEraser.classList.add('active');
    else if (t === 'fill') toolFill.classList.add('active');
  }

  toolBrush.onclick = () => setTool('brush');
  toolEraser.onclick = () => setTool('eraser');
  toolFill.onclick = () => setTool('fill');
  toolUndo.onclick = () => editorUndo();
  toolRedo.onclick = () => editorRedo();
  toolReset.onclick = () => editorReset();
  toolInvert.onclick = () => editorInvert();
  toolDownload.onclick = () => editorDownload(currentScene);

  brushSizeSlider.oninput = () => {
    editor.brushSize = parseInt(brushSizeSlider.value);
    brushSizeVal.textContent = editor.brushSize;
    updateCursor(overlayCanvas, cursor, -1, -1);
  };

  editorTarget.onchange = () => {
    loadEditorMask(scene, maskImgs, editorTarget.value);
  };

  // Mouse events on overlay canvas
  overlayCanvas.addEventListener('mousedown', (e) => {
    const [x, y] = getCanvasCoords(overlayCanvas, e);
    if (editor.tool === 'fill') {
      editorPushHistory();
      editorFill(x, y);
      renderEditorOverlay(overlayCtx, scene);
      renderEditorPreview(previewCanvas, scene);
    } else {
      editor.isDrawing = true;
      editorPushHistory();
      editorDraw(x, y);
      editor.lastX = x;
      editor.lastY = y;
    }
  });

  overlayCanvas.addEventListener('mousemove', (e) => {
    const [x, y] = getCanvasCoords(overlayCanvas, e);
    updateCursor(overlayCanvas, cursor, x, y);
    if (editor.isDrawing && editor.tool !== 'fill') {
      editorDrawLine(editor.lastX, editor.lastY, x, y);
      editor.lastX = x;
      editor.lastY = y;
    }
  });

  overlayCanvas.addEventListener('mouseup', () => {
    if (editor.isDrawing) {
      editor.isDrawing = false;
      renderEditorOverlay(overlayCtx, scene);
      renderEditorPreview(previewCanvas, scene);
    }
  });

  overlayCanvas.addEventListener('mouseleave', () => {
    editor.isDrawing = false;
    cursor.style.display = 'none';
  });

  overlayCanvas.addEventListener('mouseenter', () => {
    cursor.style.display = 'block';
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'b' || e.key === 'B') setTool('brush');
    if (e.key === 'e' || e.key === 'E') setTool('eraser');
    if (e.key === 'f' || e.key === 'F') setTool('fill');
    if (e.key === 'i' || e.key === 'I') editorInvert();
    if (e.key === '[') { editor.brushSize = Math.max(2, editor.brushSize - 5); brushSizeSlider.value = editor.brushSize; brushSizeVal.textContent = editor.brushSize; updateCursor(overlayCanvas, cursor, -1, -1); }
    if (e.key === ']') { editor.brushSize = Math.min(80, editor.brushSize + 5); brushSizeSlider.value = editor.brushSize; brushSizeVal.textContent = editor.brushSize; updateCursor(overlayCanvas, cursor, -1, -1); }
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); editorUndo(); }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); editorRedo(); }
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); editorDownload(currentScene); }
  });
}

function getCanvasCoords(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = IMG_W / rect.width;
  const scaleY = IMG_H / rect.height;
  return [
    Math.round((e.clientX - rect.left) * scaleX),
    Math.round((e.clientY - rect.top) * scaleY)
  ];
}

function updateCursor(canvas, cursorEl, x, y) {
  if (x < 0 || y < 0) { cursorEl.style.display = 'none'; return; }
  const rect = canvas.getBoundingClientRect();
  const sx = rect.width / IMG_W;
  const sy = rect.height / IMG_H;
  const size = editor.brushSize * Math.max(sx, sy);
  cursorEl.style.display = 'block';
  cursorEl.style.width = size + 'px';
  cursorEl.style.height = size + 'px';
  cursorEl.style.left = (x * sx) + 'px';
  cursorEl.style.top = (y * sy) + 'px';
}

function loadEditorMask(scene, maskImgs, maskId) {
  editor.currentMaskId = maskId;
  const maskImg = maskImgs[maskId];
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = IMG_W;
  tmpCanvas.height = IMG_H;
  const tmpCtx = tmpCanvas.getContext('2d');

  if (maskImg) {
    // Draw the mask image onto a temp canvas to read pixels
    tmpCtx.clearRect(0, 0, IMG_W, IMG_H);
    tmpCtx.drawImage(maskImg, 0, 0, IMG_W, IMG_H);
    const imgData = tmpCtx.getImageData(0, 0, IMG_W, IMG_H);
    const pixels = imgData.data; // RGBA

    editor.maskData = new Uint8ClampedArray(IMG_W * IMG_H);
    let whiteCount = 0;

    // Extract mask: check alpha channel first, then luminance
    for (let i = 0; i < IMG_W * IMG_H; i++) {
      const r = pixels[i * 4];
      const g = pixels[i * 4 + 1];
      const b = pixels[i * 4 + 2];
      const a = pixels[i * 4 + 3];

      let isMask = false;
      if (a < 128) {
        // Transparent pixel → background
        isMask = false;
      } else if (a >= 200) {
        // Opaque pixel → check if it's white/bright (mask) or dark (background)
        const lum = (r + g + b) / 3;
        isMask = lum > 128;
      } else {
        // Semi-transparent → treat as mask edge, include it
        isMask = true;
      }

      editor.maskData[i] = isMask ? 255 : 0;
      if (isMask) whiteCount++;
    }

    const sourceLabel = document.getElementById('statSource');
    if (sourceLabel) sourceLabel.textContent = `已加载 ${maskId} (${whiteCount.toLocaleString()} px)`;
  } else {
    // No mask image available — try to generate from bbox
    editor.maskData = new Uint8ClampedArray(IMG_W * IMG_H);
    const obj = scene.objects.find(o => o.id === maskId);
    if (obj) {
      const [x1, y1, x2, y2] = obj.bbox;
      for (let y = y1; y < y2; y++) {
        for (let x = x1; x < x2; x++) {
          if (x >= 0 && x < IMG_W && y >= 0 && y < IMG_H) {
            editor.maskData[y * IMG_W + x] = 255;
          }
        }
      }
      const sourceLabel = document.getElementById('statSource');
      if (sourceLabel) sourceLabel.textContent = `从 bbox 生成 (${maskId})`;
    } else {
      const sourceLabel = document.getElementById('statSource');
      if (sourceLabel) sourceLabel.textContent = `空白画布`;
    }
  }


  editor.originalMask = new Uint8ClampedArray(editor.maskData);
  editor.history = [];
  editor.historyIdx = -1;
  editorPushHistory();

  const overlayCanvas = document.getElementById('editorOverlayCanvas');
  const previewCanvas = document.getElementById('editorPreviewCanvas');
  if (overlayCanvas) renderEditorOverlay(overlayCanvas.getContext('2d'), scene);
  if (previewCanvas) renderEditorPreview(previewCanvas, scene);
  updateEditorStats();
}

function editorPushHistory() {
  // Remove any redo states
  if (editor.historyIdx < editor.history.length - 1) {
    editor.history = editor.history.slice(0, editor.historyIdx + 1);
  }
  editor.history.push(new Uint8ClampedArray(editor.maskData));
  if (editor.history.length > editor.maxHistory) editor.history.shift();
  editor.historyIdx = editor.history.length - 1;
  updateEditorStats();
}

function editorUndo() {
  if (editor.historyIdx <= 0) return;
  editor.historyIdx--;
  editor.maskData = new Uint8ClampedArray(editor.history[editor.historyIdx]);
  const scene = SCENES[currentScene];
  const overlayCanvas = document.getElementById('editorOverlayCanvas');
  const previewCanvas = document.getElementById('editorPreviewCanvas');
  if (overlayCanvas) renderEditorOverlay(overlayCanvas.getContext('2d'), scene);
  if (previewCanvas) renderEditorPreview(previewCanvas, scene);
  updateEditorStats();
}

function editorRedo() {
  if (editor.historyIdx >= editor.history.length - 1) return;
  editor.historyIdx++;
  editor.maskData = new Uint8ClampedArray(editor.history[editor.historyIdx]);
  const scene = SCENES[currentScene];
  const overlayCanvas = document.getElementById('editorOverlayCanvas');
  const previewCanvas = document.getElementById('editorPreviewCanvas');
  if (overlayCanvas) renderEditorOverlay(overlayCanvas.getContext('2d'), scene);
  if (previewCanvas) renderEditorPreview(previewCanvas, scene);
  updateEditorStats();
}

function editorReset() {
  editor.maskData = new Uint8ClampedArray(editor.originalMask);
  editorPushHistory();
  const scene = SCENES[currentScene];
  const overlayCanvas = document.getElementById('editorOverlayCanvas');
  const previewCanvas = document.getElementById('editorPreviewCanvas');
  if (overlayCanvas) renderEditorOverlay(overlayCanvas.getContext('2d'), scene);
  if (previewCanvas) renderEditorPreview(previewCanvas, scene);
}

function editorInvert() {
  editorPushHistory();
  for (let i = 0; i < editor.maskData.length; i++) {
    editor.maskData[i] = editor.maskData[i] > 0 ? 0 : 255;
  }
  const scene = SCENES[currentScene];
  const overlayCanvas = document.getElementById('editorOverlayCanvas');
  const previewCanvas = document.getElementById('editorPreviewCanvas');
  if (overlayCanvas) renderEditorOverlay(overlayCanvas.getContext('2d'), scene);
  if (previewCanvas) renderEditorPreview(previewCanvas, scene);
}

function editorDraw(x, y) {
  const r = editor.brushSize / 2;
  const val = editor.tool === 'brush' ? 255 : 0;
  const r2 = r * r;
  const x1 = Math.max(0, Math.floor(x - r));
  const y1 = Math.max(0, Math.floor(y - r));
  const x2 = Math.min(IMG_W - 1, Math.ceil(x + r));
  const y2 = Math.min(IMG_H - 1, Math.ceil(y + r));
  for (let py = y1; py <= y2; py++) {
    for (let px = x1; px <= x2; px++) {
      const dx = px - x, dy = py - y;
      if (dx * dx + dy * dy <= r2) {
        editor.maskData[py * IMG_W + px] = val;
      }
    }
  }
  // Live update overlay
  const overlayCanvas = document.getElementById('editorOverlayCanvas');
  if (overlayCanvas) renderEditorOverlay(overlayCanvas.getContext('2d'), SCENES[currentScene]);
}

function editorDrawLine(x0, y0, x1, y1) {
  const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  const r = editor.brushSize / 2;
  const val = editor.tool === 'brush' ? 255 : 0;
  const r2 = r * r;
  while (true) {
    // Draw circle at (x0, y0)
    const px1 = Math.max(0, Math.floor(x0 - r));
    const py1 = Math.max(0, Math.floor(y0 - r));
    const px2 = Math.min(IMG_W - 1, Math.ceil(x0 + r));
    const py2 = Math.min(IMG_H - 1, Math.ceil(y0 + r));
    for (let py = py1; py <= py2; py++) {
      for (let px = px1; px <= px2; px++) {
        const ddx = px - x0, ddy = py - y0;
        if (ddx * ddx + ddy * ddy <= r2) {
          editor.maskData[py * IMG_W + px] = val;
        }
      }
    }
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx) { err += dx; y0 += sy; }
  }
  // Live update overlay
  const overlayCanvas = document.getElementById('editorOverlayCanvas');
  if (overlayCanvas) renderEditorOverlay(overlayCanvas.getContext('2d'), SCENES[currentScene]);
}

function editorFill(x, y) {
  const target = editor.maskData[y * IMG_W + x];
  const fillVal = target > 0 ? 0 : 255;
  const stack = [[x, y]];
  const visited = new Uint8Array(IMG_W * IMG_H);
  while (stack.length > 0) {
    const [cx, cy] = stack.pop();
    if (cx < 0 || cx >= IMG_W || cy < 0 || cy >= IMG_H) continue;
    const idx = cy * IMG_W + cx;
    if (visited[idx]) continue;
    if (editor.maskData[idx] !== target) continue;
    visited[idx] = 1;
    editor.maskData[idx] = fillVal;
    stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
  }
}

function renderEditorOverlay(ctx, scene) {
  ctx.clearRect(0, 0, IMG_W, IMG_H);

  // Draw original mask boundary as dashed line (for reference)
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  for (let y = 1; y < IMG_H - 1; y++) {
    for (let x = 1; x < IMG_W - 1; x++) {
      const idx = y * IMG_W + x;
      if (editor.originalMask[idx] > 128) {
        const hasEdge = (
          editor.originalMask[idx - 1] <= 128 ||
          editor.originalMask[idx + 1] <= 128 ||
          editor.originalMask[idx - IMG_W] <= 128 ||
          editor.originalMask[idx + IMG_W] <= 128
        );
        if (hasEdge) {
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
          ctx.fillRect(x, y, 1, 1);
        }
      }
    }
  }
  ctx.setLineDash([]);

  // Draw current mask as cyan overlay

  const imgData = ctx.createImageData(IMG_W, IMG_H);
  for (let i = 0; i < IMG_W * IMG_H; i++) {
    if (editor.maskData[i] > 128) {
      imgData.data[i * 4] = 0;       // R
      imgData.data[i * 4 + 1] = 229; // G
      imgData.data[i * 4 + 2] = 255; // B
      imgData.data[i * 4 + 3] = 90;  // A

    }
  }
  ctx.putImageData(imgData, 0, 0);

  // Draw current mask edge as solid cyan line

  for (let y = 1; y < IMG_H - 1; y++) {
    for (let x = 1; x < IMG_W - 1; x++) {
      const idx = y * IMG_W + x;
      if (editor.maskData[idx] > 128) {
        const hasEdge = (
          editor.maskData[idx - 1] <= 128 ||
          editor.maskData[idx + 1] <= 128 ||
          editor.maskData[idx - IMG_W] <= 128 ||
          editor.maskData[idx + IMG_W] <= 128
        );
        if (hasEdge) {
          ctx.fillStyle = 'rgba(0,229,255,0.8)';

          ctx.fillRect(x, y, 1, 1);
        }
      }
    }
  }

  // Highlight differences: added (green) and removed (red)
  for (let y = 0; y < IMG_H; y++) {
    for (let x = 0; x < IMG_W; x++) {
      const idx = y * IMG_W + x;
      const orig = editor.originalMask[idx] > 128;
      const curr = editor.maskData[idx] > 128;
      if (orig !== curr) {
        // Edge of diff region
        const isEdge = (
          x === 0 || x === IMG_W - 1 || y === 0 || y === IMG_H - 1 ||
          editor.maskData[y * IMG_W + (x - 1)] > 128 !== curr ||
          editor.maskData[y * IMG_W + (x + 1)] > 128 !== curr ||
          editor.maskData[(y - 1) * IMG_W + x] > 128 !== curr ||
          editor.maskData[(y + 1) * IMG_W + x] > 128 !== curr
        );
        if (isEdge) {
          if (curr && !orig) {
            // Added: green dot
            ctx.fillStyle = 'rgba(0,230,118,0.9)';
            ctx.fillRect(x, y, 1, 1);
          } else {
            // Removed: red dot
            ctx.fillStyle = 'rgba(255,82,82,0.9)';
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }
    }

  }
}

function renderEditorPreview(canvas, scene) {
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(IMG_W, IMG_H);
  for (let i = 0; i < IMG_W * IMG_H; i++) {
    const v = editor.maskData[i];
    imgData.data[i * 4] = v;
    imgData.data[i * 4 + 1] = v;
    imgData.data[i * 4 + 2] = v;
    imgData.data[i * 4 + 3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

function updateEditorStats() {
  let whiteCount = 0;
  let diffCount = 0;
  for (let i = 0; i < editor.maskData.length; i++) {
    if (editor.maskData[i] > 128) whiteCount++;
    if (editor.maskData[i] !== editor.originalMask[i]) diffCount++;

  }
  const area = (whiteCount / (IMG_W * IMG_H) * 100).toFixed(2);
  const statWhite = document.getElementById('statWhite');
  const statArea = document.getElementById('statArea');
  const statHistory = document.getElementById('statHistory');
  const statDiff = document.getElementById('statDiff');
  if (statWhite) statWhite.textContent = whiteCount.toLocaleString();
  if (statArea) statArea.textContent = area + '%';
  if (statHistory) statHistory.textContent = editor.history.length;
  if (statDiff) statDiff.textContent = diffCount.toLocaleString();

}

function editorDownload(sceneId) {
  // Export as 960×640 binary mask PNG
  const exportW = 960, exportH = 640;
  const canvas = document.createElement('canvas');
  canvas.width = exportW;
  canvas.height = exportH;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(IMG_W, IMG_H);
  for (let i = 0; i < IMG_W * IMG_H; i++) {
    const v = editor.maskData[i];
    imgData.data[i * 4] = v;
    imgData.data[i * 4 + 1] = v;
    imgData.data[i * 4 + 2] = v;
    imgData.data[i * 4 + 3] = 255;
  }
  // Draw at original size then scale
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = IMG_W;
  tmpCanvas.height = IMG_H;
  tmpCanvas.getContext('2d').putImageData(imgData, 0, 0);
  ctx.drawImage(tmpCanvas, 0, 0, exportW, exportH);

  const link = document.createElement('a');
  link.download = `${sceneId}_${editor.currentMaskId}_mask_edited.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ════════════════════════════════════════════════
// Event Binding
// ════════════════════════════════════════════════
function bindEvents(scene, img, maskImgs) {
  // BBox controls
  const bboxControls = document.getElementById('bboxControls');
  if (bboxControls) {
    bboxControls.querySelectorAll('.overlay-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        bboxControls.querySelectorAll('.overlay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const idx = btn.dataset.idx;
        if (btn.dataset.show === 'all') {
          drawSceneWithBBoxes(scene, img, maskImgs, -1);
        } else if (idx === 'walkable') {
          drawSceneWithBBoxes(scene, img, maskImgs, 'walkable');
        } else if (idx === 'water') {
          drawSceneWithBBoxes(scene, img, maskImgs, 'water');
        } else {
          drawSceneWithBBoxes(scene, img, maskImgs, parseInt(idx));
        }
      });
    });
  }

  // Object rows
  document.querySelectorAll('.obj-row').forEach(row => {
    row.addEventListener('click', () => {
      const idx = parseInt(row.dataset.idx);
      drawSceneWithBBoxes(scene, img, maskImgs, idx);
    });
  });

  // Decoder object buttons
  const decoderBtns = document.getElementById('decoderObjBtns');
  if (decoderBtns) {
    decoderBtns.querySelectorAll('.overlay-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        decoderBtns.querySelectorAll('.overlay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        drawDecoder(scene, img, maskImgs, parseInt(btn.dataset.idx));
      });
    });
  }

  // Output controls
  const outputControls = document.getElementById('outputControls');
  if (outputControls) {
    outputControls.querySelectorAll('.overlay-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        outputControls.querySelectorAll('.overlay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const title = document.getElementById('outputLeftTitle');
        const mode = btn.dataset.mode;
        const labels = { combo: '组合 Mask 叠加', individual: '逐物体 Mask', walkable: 'Walkable 区域', water: '水面区域', depth: '深度图' };
        if (title) title.textContent = labels[mode] || mode;
        drawOutput(scene, img, maskImgs, mode);
      });
    });

    const opacitySlider = document.getElementById('opacitySlider');
    if (opacitySlider) {
      opacitySlider.addEventListener('input', () => {
        overlayOpacity = opacitySlider.value / 100;
        const activeBtn = outputControls.querySelector('.overlay-btn.active');
        if (activeBtn) drawOutput(scene, img, maskImgs, activeBtn.dataset.mode);
      });
    }
  }

  // Verify object buttons
  const verifyBtns = document.getElementById('verifyObjBtns');
  if (verifyBtns) {
    verifyBtns.querySelectorAll('.overlay-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        verifyBtns.querySelectorAll('.overlay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const idx = parseInt(btn.dataset.idx);
        drawVerification(scene, img, maskImgs, idx);
        const label = document.getElementById('verifyObjLabel');
        if (label && scene.objects[idx]) label.textContent = scene.objects[idx].label;
      });
    });
  }
}

// ════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════
renderTabs();
renderPipeline();
