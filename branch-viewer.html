<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAST SIGNAL — Branch Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a14;
    --panel: #111820;
    --border: #1a2a3a;
    --accent: #00ff88;
    --accent-dim: #00cc66;
    --text: #c0d0c0;
    --text-dim: #607060;
    --danger: #ff4444;
  }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  header .repo {
    font-size: 12px;
    color: var(--text-dim);
  }
  header .repo a {
    color: var(--text-dim);
    text-decoration: none;
  }
  header .repo a:hover { color: var(--accent); }
  .refresh-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 16px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .branch-count {
    background: var(--border);
    color: var(--text);
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
  }
  .search-box {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .search-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
    border-radius: 4px;
    outline: none;
  }
  .search-box input:focus {
    border-color: var(--accent);
  }
  .search-box input::placeholder {
    color: var(--text-dim);
  }
  .branch-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .branch-list::-webkit-scrollbar { width: 6px; }
  .branch-list::-webkit-scrollbar-track { background: transparent; }
  .branch-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .branch-item {
    padding: 8px 16px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    border-left: 2px solid transparent;
  }
  .branch-item:hover {
    background: rgba(0, 255, 136, 0.05);
  }
  .branch-item.active {
    background: rgba(0, 255, 136, 0.1);
    border-left-color: var(--accent);
    color: var(--accent);
  }
  .branch-item .icon {
    font-size: 10px;
    flex-shrink: 0;
  }
  .branch-item .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .branch-item .badge {
    margin-left: auto;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .badge-main {
    background: rgba(0, 255, 136, 0.15);
    color: var(--accent);
  }
  .badge-pr {
    background: rgba(100, 150, 255, 0.15);
    color: #6496ff;
  }
  .badge-feat {
    background: rgba(255, 200, 50, 0.12);
    color: #ffc832;
  }
  .badge-fix {
    background: rgba(255, 100, 100, 0.12);
    color: #ff6464;
  }
  .badge-refactor {
    background: rgba(180, 130, 255, 0.12);
    color: #b482ff;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .toolbar .url {
    flex: 1;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .toolbar .url a {
    color: var(--text-dim);
    text-decoration: none;
  }
  .toolbar .url a:hover { color: var(--accent); }
  .open-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .open-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .frame-container {
    flex: 1;
    position: relative;
    background: #000;
  }
  .frame-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-dim);
  }
  .placeholder .logo {
    font-size: 48px;
    opacity: 0.3;
  }
  .placeholder p {
    font-size: 13px;
  }

  /* ── Loading ── */
  .loading {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 20px 16px;
    color: var(--text-dim);
    font-size: 12px;
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error ── */
  .error-msg {
    padding: 16px;
    color: var(--danger);
    font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>⚡ LAST SIGNAL</h1>
  <span class="repo"><a href="https://github.com/ampresent/last-signal" target="_blank">ampresent/last-signal</a></span>
  <button class="refresh-btn" onclick="loadBranches()">↻ Refresh</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      Branches <span class="branch-count" id="branch-count">0</span>
    </div>
    <div class="search-box">
      <input type="text" id="search" placeholder="Filter branches…" oninput="filterBranches()">
    </div>
    <div class="branch-list" id="branch-list">
      <div class="loading"><div class="spinner"></div> Loading branches…</div>
    </div>
  </aside>

  <div class="main">
    <div class="toolbar" id="toolbar" style="display:none">
      <span>📄</span>
      <span class="url" id="frame-url"></span>
      <button class="open-btn" onclick="openExternal()">↗ Open</button>
    </div>
    <div class="frame-container">
      <div class="placeholder" id="placeholder">
        <div class="logo">⚡</div>
        <p>Select a branch to preview the game</p>
      </div>
      <iframe id="game-frame" style="display:none"></iframe>
    </div>
  </div>
</div>

<script>
const REPO = 'ampresent/last-signal';
const API = `https://api.github.com/repos/${REPO}/branches`;
const RAW = `https://raw.githubusercontent.com/${REPO}`;
const TOKEN = new URLSearchParams(location.search).get('token') || '';

const HEADERS = TOKEN ? { Authorization: `token ${TOKEN}` } : {};

let branches = [];
let activeBranch = null;

async function loadBranches() {
  const list = document.getElementById('branch-list');
  list.innerHTML = '<div class="loading"><div class="spinner"></div> Loading branches…</div>';

  try {
    let all = [];
    let page = 1;
    while (true) {
      const res = await fetch(`${API}?per_page=100&page=${page}`, { headers: HEADERS });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const data = await res.json();
      if (data.length === 0) break;
      all = all.concat(data);
      if (data.length < 100) break;
      page++;
    }

    branches = all.map(b => ({
      name: b.name,
      sha: b.commit.sha.substring(0, 7),
      isDefault: b.name === 'main',
    }));

    // Sort: main first, then alphabetical
    branches.sort((a, b) => {
      if (a.isDefault) return -1;
      if (b.isDefault) return 1;
      return a.name.localeCompare(b.name);
    });

    document.getElementById('branch-count').textContent = branches.length;
    renderBranches();
  } catch (e) {
    list.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

function getBadge(name) {
  if (name === 'main') return '<span class="badge badge-main">main</span>';
  if (name.startsWith('feat/')) return '<span class="badge badge-feat">feat</span>';
  if (name.startsWith('fix/')) return '<span class="badge badge-fix">fix</span>';
  if (name.startsWith('refactor/')) return '<span class="badge badge-refactor">refactor</span>';
  if (name.startsWith('PR') || name.includes('pull')) return '<span class="badge badge-pr">pr</span>';
  return '';
}

function renderBranches(filter = '') {
  const list = document.getElementById('branch-list');
  const filtered = filter
    ? branches.filter(b => b.name.toLowerCase().includes(filter.toLowerCase()))
    : branches;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="loading">No matching branches</div>';
    return;
  }

  list.innerHTML = filtered.map(b => `
    <div class="branch-item ${b.name === activeBranch ? 'active' : ''}"
         onclick="selectBranch('${b.name}')"
         title="${b.name}">
      <span class="icon">${b.isDefault ? '★' : '◇'}</span>
      <span class="name">${b.name}</span>
      ${getBadge(b.name)}
    </div>
  `).join('');
}

function filterBranches() {
  const q = document.getElementById('search').value;
  renderBranches(q);
}

async function selectBranch(name) {
  activeBranch = name;
  renderBranches(document.getElementById('search').value);

  const rawBase = `${RAW}/${name}`;
  const frame = document.getElementById('game-frame');
  const placeholder = document.getElementById('placeholder');
  const toolbar = document.getElementById('toolbar');

  placeholder.innerHTML = '<div class="loading"><div class="spinner"></div> Loading branch…</div>';
  placeholder.style.display = 'flex';
  frame.style.display = 'none';
  toolbar.style.display = 'flex';

  const url = `${rawBase}/index.html`;
  document.getElementById('frame-url').innerHTML =
    `<a href="${url}" target="_blank">${url}</a>`;

  try {
    const res = await fetch(url, { headers: HEADERS });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    let html = await res.text();

    // Rewrite relative URLs to point to raw.githubusercontent.com
    html = html.replace(/(src|href)=(["'])((?!https?:\/\/|#|data:)[^"']*?)\2/gi,
      (m, attr, q, path) => {
        if (path.startsWith('//')) return m;
        const abs = path.startsWith('/') ? `${rawBase}${path}` : `${rawBase}/${path}`;
        return `${attr}=${q}${abs}${q}`;
      });

    frame.srcdoc = html;
    frame.style.display = 'block';
    placeholder.style.display = 'none';
  } catch (e) {
    placeholder.innerHTML = `<div class="error-msg">❌ 加载失败: ${e.message}</div>`;
    placeholder.style.display = 'flex';
    frame.style.display = 'none';
  }
}

function openExternal() {
  if (activeBranch) {
    window.open(`${RAW}/${activeBranch}/index.html`, '_blank');
  }
}

// Init
loadBranches();
</script>
</body>
</html>
